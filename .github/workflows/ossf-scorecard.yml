name: OpenSSF Scorecard
on:
  push:
    branches: [main]
  schedule:
    - cron: '30 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    uses: platform-mesh/.github/.github/workflows/job-ossf-scorecard.yml@768af73f045db716582f148f95231048e2ff83b7 # main
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
