name: OpenSSF Scorecard
on:
  push:
    branches: [main]
  schedule:
    - cron: '30 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    uses: platform-mesh/.github/.github/workflows/job-ossf-scorecard.yml@116dcb7522b4cd1ba7fd2d969e8b6c556d1ec3bd # main
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
