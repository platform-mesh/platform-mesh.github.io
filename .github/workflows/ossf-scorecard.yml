name: OpenSSF Scorecard
on:
  push:
    branches: [main]
  schedule:
    - cron: '30 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    uses: platform-mesh/.github/.github/workflows/job-ossf-scorecard.yml@a92948421e9344929f5b9edd6048aa688c1b8ace # main
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
