name: OpenSSF Scorecard
on:
  push:
    branches: [main]
  schedule:
    - cron: '30 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard:
    uses: platform-mesh/.github/.github/workflows/job-ossf-scorecard.yml@75f52df7bff585bcb2d794a7bbeec132354933fb # main
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
