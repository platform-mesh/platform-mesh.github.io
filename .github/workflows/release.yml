name: release

on:
  push:
    branches:
      - main
      - 'release-*'
  workflow_dispatch:

permissions:
  contents: read # Baseline for actions/checkout; elevated scopes are granted per-job

concurrency:
  group: pages-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the built site to the gh-pages branch
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm # zizmor: ignore[cache-poisoning]

      - id: configure
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - id: set-version
        name: Set documentation version
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "version=main" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == refs/heads/release-* ]]; then
            echo "version=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          else
            echo "version=" >> $GITHUB_OUTPUT
          fi

      - run: npm ci
      - run: npm run build
        env:
          DOCS_VERSION: ${{ steps.set-version.outputs.version }}
          PAGES_BASE: ''

      - uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release-') }}
        with:
          folder: .vitepress/dist
          branch: gh-pages
          target-folder: ${{ steps.set-version.outputs.version }}
          clean-exclude: pr-preview
          force: false

      - uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          folder: .
          branch: gh-pages
          target-folder: .
          clean: false
          clean-exclude: |
            pr-preview
            main
            release-*
          force: false
          include: |
            index.html
            llms.txt
